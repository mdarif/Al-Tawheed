# CD Phase 1 — Release Automation (+ CD Phase 1.5 — promote/sync automation)
#
# One-click release: dispatch from `develop` with `confirm_promote: true`.
# This fast-forwards `develop` into `master`, bumps the version, runs CI
# checks, builds the debug APK, tags the commit, creates a GitHub Release,
# and syncs the version bump back into `develop` — all in one run.
#
# Traditional flow: dispatch from `master` (the promote/sync jobs are
# skipped) — this is the original CD Phase 1 behaviour, unchanged.
#
# Use `dry_run: true` to run analyze/test/build only — no commits, tags,
# releases, or pushes of any kind. Useful for testing workflow changes.
#
# Prerequisites (one-time GitHub setting):
#   Settings → Branches → master → Bypass list → add github-actions[bot]
#   Without this, the version-bump push to master will be rejected.

name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: 'patch = bug fix · minor = new feature · major = breaking change'
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major
      confirm_promote:
        description: 'Required (true) to promote develop -> master when dispatched from develop. Ignored when dispatched from master.'
        required: false
        default: false
        type: boolean
      dry_run:
        description: 'Run analyze/test/build only - skip promote, tag, release, and the develop sync.'
        required: false
        default: false
        type: boolean

# GITHUB_TOKEN needs write access to push the version-bump commit, the tag,
# the develop sync, and to create the GitHub Release.
permissions:
  contents: write

jobs:
  # ------------------------------------------------------------------ #
  # Promote develop -> master (CD Phase 1.5)
  #
  # Only runs when dispatched from develop with dry_run=false. Fast-forward
  # only: if master has diverged from develop in a way that can't
  # fast-forward, this job fails rather than guessing at a merge - see
  # docs/release-runbook.md -> Troubleshooting -> "release-auto failed at
  # promote: 'not possible to fast-forward'" for the manual recovery.
  # ------------------------------------------------------------------ #
  promote:
    name: Promote develop to master
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/develop' && inputs.dry_run != true
    outputs:
      sha: ${{ steps.merge.outputs.sha }}

    steps:
      - name: Require confirm_promote
        if: inputs.confirm_promote != true
        run: |
          echo "::error::Dispatched from develop without confirm_promote=true. Refusing to promote develop -> master (this guards against accidentally shipping stale code on master). Re-run with confirm_promote: true, or dispatch from master for the traditional flow."
          exit 1

      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Fast-forward master to develop
        id: merge
        run: |
          git fetch origin develop master
          git checkout -B master origin/master
          git merge --ff-only origin/develop
          git push origin master
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

  # ------------------------------------------------------------------ #
  # Release (CD Phase 1)
  # ------------------------------------------------------------------ #
  release:
    name: Release
    runs-on: ubuntu-latest
    needs: [promote]
    # Run when dispatched from master (promote skipped) or from develop with
    # a successful promote (or a skipped one, for dry runs). Anything else
    # (promote failed/cancelled, or an unrelated ref) skips this job too.
    if: |
      always() &&
      (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/develop') &&
      (needs.promote.result == 'success' || needs.promote.result == 'skipped')

    steps:
      # ------------------------------------------------------------------ #
      # 1. Full checkout — needed for changelog generation across all tags.
      #    Checks out the SHA `promote` just pushed to master, or falls back
      #    to the triggering ref itself (master in the traditional flow, or
      #    develop for a dry run dispatched from develop).
      # ------------------------------------------------------------------ #
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ needs.promote.outputs.sha || github.ref_name }}

      # ------------------------------------------------------------------ #
      # Free disk space — ubuntu-latest runners ship with large unused
      # toolchains (.NET, GHC, CodeQL) that leave little headroom for the
      # Android SDK + Gradle cache + APK build. Without this, packaging can
      # fail with "No space left on device" (hit on 2026-06-12).
      # ------------------------------------------------------------------ #
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/.ghcup
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          df -h /

      # ------------------------------------------------------------------ #
      # 2. Compute new version from pubspec.yaml + bump type
      #    pubspec.yaml format:  version: X.Y.Z+BUILD
      #    Tag format matches existing convention: X.Y.Z  (no v prefix)
      # ------------------------------------------------------------------ #
      - name: Compute new version
        id: version
        run: |
          CURRENT=$(grep '^version:' pubspec.yaml | awk '{print $2}')
          SEMVER=$(echo "$CURRENT" | cut -d'+' -f1)
          BUILD=$(echo "$CURRENT"  | cut -d'+' -f2)

          MAJOR=$(echo "$SEMVER" | cut -d'.' -f1)
          MINOR=$(echo "$SEMVER" | cut -d'.' -f2)
          PATCH=$(echo "$SEMVER" | cut -d'.' -f3)

          case "${{ inputs.bump }}" in
            major) MAJOR=$((MAJOR+1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR+1)); PATCH=0 ;;
            patch) PATCH=$((PATCH+1)) ;;
          esac
          BUILD=$((BUILD+1))

          NEW_SEMVER="${MAJOR}.${MINOR}.${PATCH}"
          NEW_VERSION="${NEW_SEMVER}+${BUILD}"
          TAG="${NEW_SEMVER}"

          echo "Bumping: ${CURRENT} → ${NEW_VERSION}  (tag: ${TAG})"

          # Abort early if this tag already exists — prevents duplicate releases
          if git rev-parse "refs/tags/${TAG}" >/dev/null 2>&1; then
            echo "::error::Tag ${TAG} already exists. Is this version already released?"
            exit 1
          fi

          # Persist outputs for downstream steps
          echo "current=${CURRENT}"         >> "$GITHUB_OUTPUT"
          echo "new_version=${NEW_VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}"                 >> "$GITHUB_OUTPUT"
          echo "apk=al-tawheed-${TAG}.apk"  >> "$GITHUB_OUTPUT"

          # Write the new version into pubspec.yaml
          sed -i "s/^version: .*/version: ${NEW_VERSION}/" pubspec.yaml

      # ------------------------------------------------------------------ #
      # 3. Java 21 — matches android/app/build.gradle compileOptions
      # ------------------------------------------------------------------ #
      - name: Set up Java 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      # ------------------------------------------------------------------ #
      # 4. Flutter stable
      # ------------------------------------------------------------------ #
      - name: Set up Flutter (stable)
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      # ------------------------------------------------------------------ #
      # 5. Cache Gradle
      # ------------------------------------------------------------------ #
      - name: Cache Gradle
        uses: actions/cache@v5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('android/gradle/wrapper/gradle-wrapper.properties', 'android/build.gradle', 'android/app/build.gradle', 'android/settings.gradle', 'android/gradle.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      # ------------------------------------------------------------------ #
      # 6. Override Gradle JVM heap (same guard as CI workflow)
      # ------------------------------------------------------------------ #
      - name: Override Gradle JVM args
        run: |
          echo "org.gradle.jvmargs=-Xmx4g -XX:MaxMetaspaceSize=512m -Dkotlin.daemon.jvm.options=-Xmx1g" >> android/gradle.properties

      # ------------------------------------------------------------------ #
      # 7. Install dependencies
      # ------------------------------------------------------------------ #
      - name: Install Flutter dependencies
        run: flutter pub get

      # ------------------------------------------------------------------ #
      # 8. Analyze — refuse to tag a build with static analysis errors
      # ------------------------------------------------------------------ #
      - name: Analyze code
        run: flutter analyze --fatal-warnings

      # ------------------------------------------------------------------ #
      # 10. Test — refuse to tag a build with failing tests
      # ------------------------------------------------------------------ #
      - name: Run tests
        run: flutter test --reporter=expanded

      # ------------------------------------------------------------------ #
      # 11. Build debug APK
      #     Signed with the Android debug key — no keystore secret needed.
      #     Release signing (production key) comes in CD Phase 2.
      #     Run integration tests + release APK locally: make release-apk DEVICE=<id>
      # ------------------------------------------------------------------ #
      - name: Build debug APK
        run: flutter build apk --debug

      # ------------------------------------------------------------------ #
      # 12. Rename APK to include version tag in filename
      # ------------------------------------------------------------------ #
      - name: Rename APK
        run: |
          mv build/app/outputs/flutter-apk/app-debug.apk \
             "${{ steps.version.outputs.apk }}"

      # ------------------------------------------------------------------ #
      # 13a. Generate structured changelog from conventional commits
      #      git-cliff groups feat/fix/perf commits and skips ci/chore/docs
      #      noise. Output is Markdown used in the GitHub Release body.
      # ------------------------------------------------------------------ #
      - name: Generate changelog
        id: cliff
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --unreleased --strip header
        env:
          GITHUB_REPO: ${{ github.repository }}

      # ------------------------------------------------------------------ #
      # 13b. Derive Play Store plain-text notes from the changelog
      #      Play Store "What's new" field: max 500 characters per locale.
      #      This step strips Markdown formatting and truncates to 480 chars
      #      (leaving room for a manual tweak before submitting).
      #      The file is attached to the GitHub Release as a ready-to-copy
      #      artifact — open it, copy, paste into Play Console.
      # ------------------------------------------------------------------ #
      - name: Generate Play Store release notes
        run: |
          MARKDOWN="${{ steps.cliff.outputs.content }}"

          # Strip Markdown: remove ### headings, bold (**text**), leading dashes
          PLAIN=$(echo "$MARKDOWN" \
            | sed 's/^### //g' \
            | sed 's/\*\*//g' \
            | sed 's/^- /• /g' \
            | sed '/^$/d')

          # Truncate to 480 characters to stay safely under the 500-char limit
          TRUNCATED=$(echo "$PLAIN" | head -c 480)

          # Warn if we had to truncate
          FULL_LEN=$(echo "$PLAIN" | wc -c | tr -d ' ')
          if [ "$FULL_LEN" -gt 480 ]; then
            echo "::warning::Play Store notes truncated to 480 chars (was ${FULL_LEN}). Review before submitting."
          fi

          echo "$TRUNCATED" > play-store-notes.txt
          echo "Play Store notes:"
          cat play-store-notes.txt

      # ------------------------------------------------------------------ #
      # 14. Commit version bump, tag, and push
      #     Requires github-actions[bot] in the master branch bypass list.
      #     Skipped for dry runs — nothing is committed, tagged, or pushed.
      # ------------------------------------------------------------------ #
      - name: Configure git identity
        if: inputs.dry_run != true
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Commit, tag, and push
        if: inputs.dry_run != true
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          NEW_VERSION="${{ steps.version.outputs.new_version }}"

          git add pubspec.yaml
          git commit -m "chore: release ${TAG}"
          git tag "${TAG}" -m "Release ${TAG}"
          git push origin master
          git push origin "${TAG}"

      # ------------------------------------------------------------------ #
      # 15. Create GitHub Release — attach APK and Play Store notes
      #     Skipped for dry runs.
      # ------------------------------------------------------------------ #
      - name: Create GitHub Release
        if: inputs.dry_run != true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          APK="${{ steps.version.outputs.apk }}"
          NEW_VERSION="${{ steps.version.outputs.new_version }}"
          CHANGELOG="${{ steps.cliff.outputs.content }}"

          [ -z "$CHANGELOG" ] && CHANGELOG="- Maintenance release"

          gh release create "${TAG}" \
            "${APK}#Al-Tawheed Android APK (debug)" \
            "play-store-notes.txt#Play Store release notes (plain text)" \
            --title "Al-Tawheed ${TAG}" \
            --notes "## What's changed

          ${CHANGELOG}

          ---
          **Build:** \`${NEW_VERSION}\`
          **APK:** debug build, install via \`adb install ${APK}\`
          **Play Store notes:** download \`play-store-notes.txt\` above — copy/paste into Play Console → What's new"

      # ------------------------------------------------------------------ #
      # Dry run summary — confirms analyze/test/build succeeded without
      # touching master, develop, tags, or releases.
      # ------------------------------------------------------------------ #
      - name: Dry run summary
        if: inputs.dry_run == true
        run: |
          echo "::notice::Dry run complete for ${{ github.ref_name }} — analyze, test, and build succeeded. Nothing was committed, tagged, pushed, or released."

  # ------------------------------------------------------------------ #
  # Sync develop with master (CD Phase 1.5)
  #
  # The release job above commits the version bump + tag directly to
  # master. Fast-forward that into develop so the next release's promote
  # doesn't hit a pubspec.yaml version conflict. Fast-forward only - if
  # develop has picked up its own commits since the last sync, this job
  # fails rather than guessing at a merge.
  # ------------------------------------------------------------------ #
  sync-develop:
    name: Sync develop with master
    runs-on: ubuntu-latest
    needs: [release]
    if: always() && needs.release.result == 'success' && inputs.dry_run != true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Fast-forward develop to master
        run: |
          git fetch origin develop master
          git checkout -B develop origin/develop
          git merge --ff-only origin/master || {
            echo "::error::develop has diverged from master and cannot be fast-forwarded (develop likely picked up its own commits since the last sync). See docs/release-runbook.md -> Troubleshooting -> \"sync-develop failed: 'not possible to fast-forward'\" for the manual recovery (resolve the pubspec.yaml version conflict on develop, then push)."
            exit 1
          }
          git push origin develop
