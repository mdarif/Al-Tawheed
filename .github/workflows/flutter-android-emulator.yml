# Flutter Android Emulator — Integration tests on an Android emulator
#
# Runs on:
#   • Every PR into master  (mirrors flutter-regression.yml's iOS gate)
#   • Nightly at 02:00 UTC  (catches develop drift before it reaches master)
#   • Manual dispatch        (on-demand re-run without a commit)
#
# CD Phase 4a (non-blocking): results surface in the Actions tab but do not
# gate anything yet. See docs/ci-cd.md -> "Roadmap" -> "CD Phase 4 — Android
# emulator CI gate" for 4b, which would make this a required check and make
# release-runbook.md Step 1's on-device run optional.
#
# Patrol native tests (patrol_test/native_test.dart) are intentionally NOT
# run here. They need patrol_cli plus an instrumented test build (roughly
# doubling this job's runtime) and exercise airplane mode / notification
# shade automation, which is significantly flakier on emulators than on a
# physical device. They remain part of release-runbook.md Step 1
# (`make release-apk` on a connected device).

name: Flutter Android Emulator

on:
  pull_request:
    branches:
      - master
  schedule:
    - cron: '0 2 * * *'   # 02:00 UTC daily
  workflow_dispatch:       # manual trigger from Actions tab

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  integration:
    name: Integration tests — Android Emulator
    runs-on: ubuntu-latest

    steps:
      # ------------------------------------------------------------------ #
      # 1. Checkout
      # ------------------------------------------------------------------ #
      - name: Checkout repository
        uses: actions/checkout@v6

      # ------------------------------------------------------------------ #
      # 2. Flutter stable
      # ------------------------------------------------------------------ #
      - name: Set up Flutter (stable)
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      # ------------------------------------------------------------------ #
      # 3. Cache pub packages
      # ------------------------------------------------------------------ #
      - name: Cache pub packages
        uses: actions/cache@v5
        with:
          path: ~/.pub-cache
          key: pub-cache-${{ runner.os }}-${{ hashFiles('pubspec.lock') }}
          restore-keys: |
            pub-cache-${{ runner.os }}-

      # ------------------------------------------------------------------ #
      # 4. Install dependencies
      # ------------------------------------------------------------------ #
      - name: Install Flutter dependencies
        run: flutter pub get

      # ------------------------------------------------------------------ #
      # 5. Analyze (fast sanity check before booting an emulator)
      # ------------------------------------------------------------------ #
      - name: Analyze code
        run: flutter analyze --fatal-warnings

      # ------------------------------------------------------------------ #
      # 6. Enable KVM so the emulator can use hardware acceleration
      # ------------------------------------------------------------------ #
      - name: Enable KVM group perms
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      # ------------------------------------------------------------------ #
      # 7. Boot Android emulator and run integration tests
      #    Timeout is generous (15 min) — first run fetches the catalog
      #    from the CDN and may download audio metadata.
      # ------------------------------------------------------------------ #
      - name: Run integration tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          target: google_apis
          arch: x86_64
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: true
          script: |
            set +e
            flutter test integration_test/app_test.dart \
              -d emulator-5554 \
              --timeout 15m
            status=$?
            adb logcat -d > /tmp/emulator.log
            exit $status

      # ------------------------------------------------------------------ #
      # 8. Upload logcat on failure (attached to the workflow run)
      # ------------------------------------------------------------------ #
      - name: Upload logcat on failure
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: logcat
          path: /tmp/emulator.log
          retention-days: 7
