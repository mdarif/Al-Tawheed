# Flutter CI — Al-Tawheed Islamic Education App
#
# Triggers: push to develop, PRs into develop, PRs into master.
# Runs on ubuntu-latest with Java 21 + Flutter stable.
#
# KNOWN ISSUE: test/widget_test.dart is the stale Flutter counter template.
# It is intentionally excluded from the test command below.
# TODO: delete test/widget_test.dart and run `flutter test --reporter=expanded`
#       without explicit file args once that file is removed.

name: Flutter CI

on:
  push:
    branches:
      - develop
  pull_request:
    branches:
      - develop
      - master

# Cancel any in-progress run on the same branch or PR to save runner minutes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Flutter CI
    runs-on: ubuntu-latest

    steps:
      # ------------------------------------------------------------------ #
      # 1. Checkout
      # ------------------------------------------------------------------ #
      - name: Checkout repository
        uses: actions/checkout@v4

      # ------------------------------------------------------------------ #
      # 2. Java 21 (required by android/app/build.gradle compileOptions)
      #    Must come before Flutter setup.
      # ------------------------------------------------------------------ #
      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      # ------------------------------------------------------------------ #
      # 3. Flutter stable
      #    subosito/flutter-action writes android/local.properties with the
      #    flutter.sdk path that android/settings.gradle reads. Without this
      #    the Gradle build fails: "flutter.sdk not set in local.properties".
      # ------------------------------------------------------------------ #
      - name: Set up Flutter (stable)
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      # ------------------------------------------------------------------ #
      # 4. Cache pub packages
      # ------------------------------------------------------------------ #
      - name: Cache pub packages
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: pub-cache-${{ runner.os }}-${{ hashFiles('pubspec.lock') }}
          restore-keys: |
            pub-cache-${{ runner.os }}-

      # ------------------------------------------------------------------ #
      # 5. Cache Gradle files
      #    android/gradle.properties is included in the key because it
      #    controls Jetifier, parallel builds, and other AGP-sensitive config.
      # ------------------------------------------------------------------ #
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('android/gradle/wrapper/gradle-wrapper.properties', 'android/build.gradle', 'android/app/build.gradle', 'android/settings.gradle', 'android/gradle.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      # ------------------------------------------------------------------ #
      # 6. Override Gradle daemon JVM args for CI runner memory limits
      #
      #    android/gradle.properties sets org.gradle.jvmargs=-Xmx4g which
      #    is safe for CI runners. This step is a belt-and-suspenders guard
      #    in case the file is updated locally with a higher value.
      #    Appending to gradle.properties overrides the daemon heap because
      #    Gradle uses the last value it sees for duplicate keys.
      # ------------------------------------------------------------------ #
      - name: Override Gradle JVM args for CI
        run: |
          echo "org.gradle.jvmargs=-Xmx4g -XX:MaxMetaspaceSize=512m -Dkotlin.daemon.jvm.options=-Xmx1g" >> android/gradle.properties

      # ------------------------------------------------------------------ #
      # 7. Install dependencies
      # ------------------------------------------------------------------ #
      - name: Install Flutter dependencies
        run: flutter pub get

      # ------------------------------------------------------------------ #
      # 8. Analyze (static analysis)
      #    --fatal-warnings fails the job on warnings and errors.
      #    --fatal-infos is intentionally avoided: third-party packages
      #    produce INFO-level hints that are outside this project's control.
      # ------------------------------------------------------------------ #
      - name: Analyze code
        run: flutter analyze --fatal-warnings

      # ------------------------------------------------------------------ #
      # 9. Run tests
      #
      #    test/widget_test.dart is the unmodified Flutter counter-app
      #    template and always fails (no counter widget in this app).
      #    It is excluded by naming only the known-good test files.
      #    TODO: delete test/widget_test.dart, then simplify to:
      #          flutter test --reporter=expanded
      # ------------------------------------------------------------------ #
      - name: Run tests
        run: flutter test test/unit_tests.dart test/widget_test_updated.dart --reporter=expanded

      # ------------------------------------------------------------------ #
      # 10. Build Android debug APK
      # ------------------------------------------------------------------ #
      - name: Build Android debug APK
        run: flutter build apk --debug

      # ------------------------------------------------------------------ #
      # 11. Upload debug APK artifact (kept 7 days)
      # ------------------------------------------------------------------ #
      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 7
