# git-cliff configuration
# Generates structured release notes from conventional commits.
# Docs: https://git-cliff.org/docs/configuration

[changelog]
# No static header — the release workflow injects its own title.
header = ""
body = """
{% for group, commits in commits | group_by(attribute="group") %}\
### {{ group }}
{% for commit in commits | sort(attribute="message") %}\
- {% if commit.scope %}**{{ commit.scope }}:** {% endif %}{{ commit.message | upper_first }}
{% endfor %}
{% endfor %}\
"""
footer = ""
trim = true

[git]
conventional_commits = true
filter_unconventional = true

commit_parsers = [
  # Surface to users — included in release notes
  { message = "^feat",  group = "Features" },
  { message = "^fix",   group = "Bug Fixes" },
  { message = "^perf",  group = "Performance" },

  # Infrastructure — excluded from user-facing notes
  { message = "^chore",    skip = true },
  { message = "^ci",       skip = true },
  { message = "^docs",     skip = true },
  { message = "^test",     skip = true },
  { message = "^refactor", skip = true },
  { message = "^style",    skip = true },
  { message = "^build",    skip = true },
  { message = "^revert",   skip = true },
]

filter_commits = true
tag_pattern   = "[0-9]*\\.[0-9]*\\.[0-9]*"
topo_order    = false
sort_commits  = "oldest"
