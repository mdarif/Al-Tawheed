coverage:
  status:
    project:
      default:
        target: auto        # require coverage to stay at or above current level
        threshold: 1%       # allow 1% drop before failing the PR
    patch:
      default:
        target: 50%         # new code in a PR should be at least 50% covered

ignore:
  # Generated l10n files — no point covering boilerplate. gen-l10n emits one
  # file per language subtag: en, ar, ur (ur_roman is a scriptCode variant that
  # lands inside app_localizations_ur.dart, so there is no _ur_roman.dart).
  - "lib/l10n/app_localizations.dart"
  - "lib/l10n/app_localizations_en.dart"
  - "lib/l10n/app_localizations_ar.dart"
  - "lib/l10n/app_localizations_ur.dart"
