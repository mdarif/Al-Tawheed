name: myapp
description: Sharah Kitaab al-Tawheed.

publish_to: 'none'

version: 2.3.1+18

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  # Audio
  just_audio: ^0.9.39
  path_provider: ^2.1.5
  audio_service: ^0.18.15
  audio_session: ^0.1.21
  # State & navigation
  provider: ^6.1.2
  go_router: ^14.2.0
  # Persistence
  shared_preferences: ^2.3.2
  # Networking (catalog fetch + connectivity)
  http: ^1.2.0
  connectivity_plus: ^6.0.0
  # Localisation
  intl: ^0.20.2
  # UI utilities
  url_launcher: ^6.3.1
  share_plus: ^13.1.0
  package_info_plus: ^10.1.0
  # Notifications
  flutter_local_notifications: ^17.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  patrol: ^4.6.1
  # Faking ConnectivityPlatform in connectivity_provider_test.dart
  connectivity_plus_platform_interface: ^2.1.0
  plugin_platform_interface: ^2.1.8
  # Faking SharePlatform in book_reader_screen_test.dart
  share_plus_platform_interface: ^7.1.0

patrol:
  app_name: At-Tawheed
  android:
    package_name: com.almarfa.tawheed
  ios:
    bundle_id: com.testing.tawheed

flutter:
  uses-material-design: true
  generate: true          # enables flutter gen-l10n
  assets:
    - assets/
    - assets/images/
    - assets/content/
  fonts:
    - family: NotoNaskhArabic
      fonts:
        - asset: assets/fonts/NotoNaskhArabic-Regular.ttf
    - family: NotoNastaliqUrdu
      fonts:
        - asset: assets/fonts/NotoNastaliqUrdu-Regular.ttf
