name: myapp
description: Sharah Kitaab al-Tawheed.

publish_to: 'none'

version: 2.0.1+10

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  # Audio
  just_audio: ^0.9.39
  path_provider: ^2.1.5
  audio_service: ^0.18.15
  audio_session: ^0.1.21
  # State & navigation
  provider: ^6.1.2
  go_router: ^14.2.0
  # Persistence
  shared_preferences: ^2.3.2
  # Networking (catalog fetch)
  http: ^1.2.0
  # Localisation
  intl: ^0.20.2
  google_fonts: ^6.2.1
  # UI utilities
  cupertino_icons: ^1.0.9
  url_launcher: ^6.3.1
  share_plus: ^13.1.0
  package_info_plus: ^10.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  generate: true          # enables flutter gen-l10n
  assets:
    - assets/
    - assets/images/
